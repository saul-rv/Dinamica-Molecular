name: Build C++ Simulation

on:
  push:
    branches: [ main, patch-1 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libglfw3-dev libgl1-mesa-dev cmake

      - name: Configure CMake
        working-directory: c++
        run: cmake -B build

      - name: Build
        working-directory: c++
        run: cmake --build build

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: python
        run: pytest tests/ -v
